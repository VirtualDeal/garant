<style>

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }
  .bg-grid {
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px);
    background-size:60px 60px;
  }

  header {
    position:sticky; top:0; z-index:100;
    background:rgba(10,12,18,0.9); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    padding:0 40px; height:68px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
  .logo-icon { width:38px; height:38px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 0 20px rgba(0,229,160,0.3); }
  .logo-text { font-family:'Inter',sans-serif; font-weight:800; font-size:1.4rem; color:var(--text); }
  .logo-text span { color:var(--accent); }
  .back-btn {
    background:transparent; border:1px solid var(--border);
    color:var(--muted); font-family:'Inter',sans-serif;
    padding:8px 18px; border-radius:8px; cursor:pointer;
    font-size:0.85rem; transition:all 0.2s; text-decoration:none;
    display:inline-block;
  }
  .back-btn:hover { border-color:rgba(0,229,160,0.3); color:var(--accent); }

  .container { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:50px 24px 80px; }

  /* RATING SUMMARY */
  .rating-summary {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:36px 40px; margin-bottom:36px;
    display:flex; gap:48px; align-items:center; flex-wrap:wrap;
  }
  .rating-big { font-family:'Inter',sans-serif; font-size:5rem; font-weight:800; color:var(--gold); line-height:1; }
  .rating-stars-row { display:flex; gap:6px; margin:10px 0 6px; }
  .star-big { font-size:1.6rem; color:var(--gold); }
  .rating-total { color:var(--muted); font-size:0.88rem; }
  .rating-bars { flex:1; min-width:200px; }
  .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .bar-label { color:var(--muted); font-size:0.82rem; width:36px; text-align:right; white-space:nowrap; }
  .bar-track { flex:1; height:6px; background:rgba(255,255,255,0.07); border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; background:var(--gold); }
  .bar-count { color:var(--muted); font-size:0.78rem; width:24px; }

  /* FILTERS */
  .filter-row {
    display:flex; gap:10px; flex-wrap:wrap; margin-bottom:28px; align-items:center;
  }
  .filter-label { color:var(--muted); font-size:0.85rem; margin-right:4px; }
  .filter-btn {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--muted); font-family:'Inter',sans-serif;
    padding:7px 16px; border-radius:8px; cursor:pointer;
    font-size:0.83rem; transition:all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color:rgba(245,197,66,0.4); color:var(--gold); background:rgba(245,197,66,0.05);
  }
  .filter-btn.active { font-weight:600; }

  /* REVIEW CARD */
  .reviews-grid { display:flex; flex-direction:column; gap:14px; }
  .review-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:20px 24px;
    transition:border-color 0.2s;
  }
  .review-card:hover { border-color:rgba(255,255,255,0.12); }
  .review-header { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .avatar {
    width:36px; height:36px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:0.8rem; font-weight:700; flex-shrink:0;
    font-family:'Inter',sans-serif;
  }
  .review-meta { flex:1; }
  .review-name { font-weight:600; font-size:0.9rem; }
  .review-date { color:var(--muted); font-size:0.75rem; margin-top:2px; }
  .review-stars { display:flex; gap:2px; font-size:0.9rem; }
  .s-gold { color:var(--gold); }
  .s-empty { color:rgba(255,255,255,0.15); }
  .review-text { color:#b0b8cc; font-size:0.88rem; line-height:1.6; }
  .badge-verified {
    background:rgba(0,229,160,0.08); border:1px solid rgba(0,229,160,0.2);
    color:var(--accent); font-size:0.68rem; padding:2px 8px; border-radius:10px;
    white-space:nowrap; margin-left:auto;
  }

  /* ADD REVIEW */
  .add-review-section { margin-bottom:28px; }
  .add-review-btn {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none; border-radius:10px; padding:13px 28px;
    color:#000; font-weight:700; font-size:0.92rem;
    cursor:pointer; font-family:'Inter',sans-serif;
    transition:opacity 0.2s;
  }
  .add-review-btn:hover { opacity:0.88; }
  .add-review-form {
    display:none; margin-top:16px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:16px; padding:28px;
  }
  .add-review-form.open { display:block; }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; font-size:0.82rem; color:var(--muted); margin-bottom:8px; font-weight:500; }
  .form-input, .form-textarea {
    width:100%; background:var(--bg);
    border:1px solid var(--border); border-radius:10px;
    padding:12px 16px; color:var(--text);
    font-size:0.9rem; font-family:'Inter',sans-serif;
    outline:none; transition:border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus { border-color:rgba(0,229,160,0.35); }
  .form-textarea { resize:vertical; min-height:90px; }
  .star-picker { display:flex; gap:6px; margin-bottom:18px; }
  .star-pick { font-size:1.6rem; cursor:pointer; color:rgba(255,255,255,0.2); transition:color 0.15s; }
  .star-pick.lit { color:var(--gold); }
  .form-submit {
    background:var(--accent); border:none; border-radius:8px;
    padding:11px 26px; color:#000; font-weight:700;
    font-size:0.88rem; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .form-msg { margin-top:12px; font-size:0.82rem; }
  .form-msg.ok { color:var(--accent); }
  .form-msg.err { color:var(--red); }

  /* COUNT */
  .reviews-count { color:var(--muted); font-size:0.85rem; margin-bottom:14px; }
</style>

  'Ждал 3 часа пока проверят акк. Это слишком долго, в следующий раз подумаю.',
  'Не понравилось что долго не отвечали в тг. Почти 2 часа ждал.',

  'Сделка прошла но поддержка реагирует медленно. Ожидал быстрее.',
  'Один раз сделка зависла на несколько часов без обьяснений. Потом всё решилось но осадок остался.',

  'Ответили только через полтора часа. Для срочной сделки это плохо.'
];

let selectedStar = 0;
let currentFilter = 0;

function generateReviews() {
  const all = [];
  const negativeIndices = new Set([12,35,67,89,120,145,170,200,230,260,290,320,350]);

  for (let i=0; i<376; i++) {
    let stars, text;
    if (negativeIndices.has(i)) {
      stars = Math.random()<0.5 ? 1 : 2;
      text = negativeReviews[all.filter(r=>r.negative).length % negativeReviews.length];
    } else {
      const r = Math.random();
      if (r < 0.72) stars = 5;
      else if (r < 0.90) stars = 4;
      else if (r < 0.95) stars = 3;
      else stars = 4;
      text = positiveReviews[i % positiveReviews.length];
    }
    const nameIdx = (i * 7 + 3) % NAMES.length;
    all.push({
      id: i,
      name: NAMES[nameIdx],
      date: DATES[i],
      stars,
      text,
      color: COLORS[i % COLORS.length],
      negative: negativeIndices.has(i)
    });
  }
  return all;
}

const allReviews = generateReviews();

function renderStars(n) {
  let s = '';
  for (let i=1;i<=5;i++) s+=`<span class="${i<=n?'s-gold':'s-empty'}">★</span>`;
  return s;
}

function renderReviews(filter) {
  const grid = document.getElementById('reviewsGrid');
  const count = document.getElementById('reviewsCount');
  const filtered = filter===0 ? allReviews : allReviews.filter(r=>r.stars===filter);
  count.textContent = `Показано ${filtered.length} отзывов`;
  grid.innerHTML = filtered.map(r=>`
    <div class="review-card">
      <div class="review-header">
        <div class="avatar" style="background:${r.color}22;color:${r.color}">${r.name[0].toUpperCase()}</div>
        <div class="review-meta">
          <div class="review-name">${r.name}</div>
          <div class="review-date">${r.date}</div>
        </div>
        <div class="review-stars">${renderStars(r.stars)}</div>
        ${!r.negative ? '<span class="badge-verified">✓ Верифицирован</span>' : ''}
      </div>
      <div class="review-text">${r.text}</div>
    </div>
  `).join('');
}

function filterReviews(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderReviews(val);
}

function toggleForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('open');
}

function setStar(n) {
  selectedStar = n;
  document.querySelectorAll('.star-pick').forEach(s=>{
    s.classList.toggle('lit', parseInt(s.dataset.v)<=n);
  });
}

function submitReview() {
  const key = document.getElementById('reviewKey').value.trim().toUpperCase();
  const text = document.getElementById('reviewText').value.trim();
  const msg = document.getElementById('formMsg');
  if (!VALID_KEYS.includes(key)) {
    msg.textContent = '✗ Неверный ключ. Только покупатели с действующим ключом могут оставлять отзыв.';
    msg.className = 'form-msg err'; return;
  }
  if (!text) { msg.textContent = '✗ Напишите текст отзыва.'; msg.className='form-msg err'; return; }
  if (!selectedStar) { msg.textContent = '✗ Выберите оценку.'; msg.className='form-msg err'; return; }
  msg.textContent = '✓ Отзыв отправлен! Спасибо.';
  msg.className='form-msg ok';
  document.getElementById('reviewKey').value='';
  document.getElementById('reviewText').value='';
  setStar(0);
}

renderReviews(0);
